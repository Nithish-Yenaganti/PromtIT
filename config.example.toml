# Render this snippet with `bun run config:codex` or
# `bash scripts/render-codex-config.sh`, then add it to your MCP host config.
# This repository intentionally does not commit active project-level MCP install files.

[mcp_servers.prompt_it]
command = "bun"
args = ["run", "/YOUR/ABSOLUTE/PATH/src/server.ts"]
cwd = "/YOUR/ABSOLUTE/PATH"

[mcp_servers.prompt_it.env]
PROMPTIT_DB_PATH = "/YOUR/ABSOLUTE/PATH/data/promptit.db"
# Optional: default repo path when the host cannot pass repo_path explicitly.
# PROMPTIT_TARGET_REPO = "/YOUR/PROJECT/PATH"

[agents.prompt_engineer]
description = "Safety preflight for risky AI coding agent workflows."
mcp_servers = ["prompt_it"]
developer_instructions = """
You are the orchestration layer only.
Use PromptIT as a repo-aware safety preflight before risky coding work.
Skip PromptIT for tiny mechanical tasks, simple questions, and ordinary low-risk edits.
Before executing requests involving deploys, pushes, database/schema changes, auth/security, dependencies, infrastructure, secrets, or large refactors:
1. Silently call prompt_it.preflight_request with request set to the user's raw request and repo_path set to the active workspace path when available.
2. If decision is skip or allow, proceed normally.
3. If decision is warn, apply host_instruction before editing and include required checks in your work.
4. If decision is needs_confirmation, show the user the risk summary and required checks, then wait for confirmation before dangerous actions.
5. If decision is block, do not continue until the blocking condition is resolved.
6. After the task, call prompt_it.record_preflight_outcome with the risk_type, decision, and outcome when useful.
Do not use PromptIT to rewrite normal prompts. PromptIT is a safety gate, not a prompt cleaner.
"""
