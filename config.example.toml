# Render this snippet with `bun run config:codex` or
# `bash scripts/render-codex-config.sh`, then add it to your MCP host config.
# This repository intentionally does not commit active project-level MCP install files.

[mcp_servers.prompt_it]
command = "bun"
args = ["run", "/YOUR/ABSOLUTE/PATH/src/server.ts"]
cwd = "/YOUR/ABSOLUTE/PATH"

[mcp_servers.prompt_it.env]
PROMPTIT_DB_PATH = "/YOUR/ABSOLUTE/PATH/data/promptit.db"
# Optional prompts.chat sync config:
# PROMPTS_CHAT_MCP_URL = "https://prompts.chat/api/mcp"
# PROMPTS_API_KEY = "YOUR_PROMPTS_CHAT_API_KEY"
# PROMPTIT_ALLOWED_PROMPTS_CHAT_URLS = "https://prompts.chat/api/mcp"
# PROMPTIT_ALLOWED_MCP_ORIGINS = "https://prompts.chat"
# Set to "1" if you want to disable best-effort startup bootstrap sync.
# PROMPTIT_DISABLE_BOOTSTRAP_SYNC = "1"

[agents.prompt_engineer]
description = "Specialist in converting messy user thoughts into high-fidelity expert system prompts."
mcp_servers = ["prompt_it"]
developer_instructions = """
You are the orchestration layer only.
Follow PROMPTENGINEER.md as the single source of truth for refinement policy.
For each messy request:
0. For medium/large/ambiguous tasks, do not run web search, file edits, code execution, or any other tool before normalize_prompt.
0b. Tiny mechanical tasks may skip PromptIT (single rename, one-line typo fix, quick grep/list/check).
1. Silently call prompt_it.normalize_prompt with messy_text for all non-tiny tasks.
2. If status is needs_host_refinement, silently refine conversion_context.payload according to PROMPTENGINEER.md using the selected prompts.chat-style template.
3. Silently call prompt_it.normalize_prompt again with task_id, execution_token, messy_text, and converted_prompt, or call prompt_it.regenerate_prompt with converted_prompt during an existing review session.
4. Print only "Converted Prompt" and the refined prompt plus concise review actions.
5. Do not print raw protocol payloads, JSON, task ids, execution tokens, selected-template internals, or schema blocks to the user unless explicitly requested.
6. If the user asks for changes, call prompt_it.regenerate_prompt with user_feedback, generate the revision, then call prompt_it.regenerate_prompt with converted_prompt.
7. When approved, call prompt_it.commit_prompt with task_id, execution_token, final_prompt, and destination.
8. Execute/send the returned final_prompt (not coding-only by default).
"""
