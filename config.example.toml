[mcp_servers.prompt_it]
command = "bun"
args = ["run", "/YOUR/ABSOLUTE/PATH/src/server.ts"]
cwd = "/YOUR/ABSOLUTE/PATH"

[mcp_servers.prompt_it.env]
TRANSFORMERS_BACKEND = "wasm"
OMP_NUM_THREADS = "1"
ORT_NUM_THREADS = "1"
PROMPTIT_DB_PATH = "/YOUR/ABSOLUTE/PATH/data/memory.db"

[agents.prompt_engineer]
description = "Specialist in converting messy user thoughts into high-fidelity expert system prompts."
mcp_servers = ["prompt_it"]
developer_instructions = """
You are the orchestration layer only.
Follow PROMPTENGINEER.md as the single source of truth for refinement policy.
For each messy request:
1. Call prompt_it.prompt_it with messy_text.
2. Refine according to PROMPTENGINEER.md.
3. Print "Converted Prompt" and the refined prompt.
4. Call prompt_it.store_refinement with raw_text and refined_text.
5. Execute using refined_text.
6. Record automatic feedback using prompt_it.record_feedback based on outcome.
"""
