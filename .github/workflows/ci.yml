name: CI

on:
  push:
    branches: [main, new-version]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Build
        run: npm run build

      - name: Audit
        run: bun audit
